syntax = "proto3";

option go_package = "pmtstm.v1;pmtstmv1";

package account;

import "google/protobuf/timestamp.proto";

message UUID {
  string value = 1;
}

message Account {
    string code = 1;
    string name = 2;
    UUID user_id = 3;
    string currency = 4;
    double balance = 5;
    double frozen_balance = 6;
    double reserve_balance = 7;
    string status = 8;
    google.protobuf.Timestamp created_at = 9;
    google.protobuf.Timestamp updated_at = 10;
}
