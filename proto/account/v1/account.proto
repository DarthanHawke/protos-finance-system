syntax = "proto3";

option go_package = "pmtstm.v1;pmtstmv1";

package account;

import "account/v1/shared.proto";
import "google/protobuf/empty.proto";

service AccountService {
  rpc CreateAccount (CreateAccountRequest) returns (google.protobuf.Empty);
  rpc GetAccount(GetAccountRequest) returns (GetAccountResponse);
  rpc GetAccounts(GetAccountsRequest) returns (GetAccountsResponse);
  rpc BlockAccount (BlockAccountRequest) returns (google.protobuf.Empty);
  rpc CloseAccount (CloseAccountRequest) returns (google.protobuf.Empty);
}

message CreateAccountRequest {
  string name = 1;
  UUID user_id = 2;
  string currency = 3;
}

message GetAccountRequest {
  string code = 1;
}

message GetAccountResponse {
  Account account = 1;
}

message GetAccountsRequest {
  UUID user_id = 1;
  int32 limit = 2;
  int32 offcet = 3;
}

message GetAccountsResponse {
  repeated Account accounts = 1;
}

message BlockAccountRequest {
  string code = 1;
}

message CloseAccountRequest {
  string code = 1;
}
